<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Cartesiano - Mobile e Computação Gráfica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <h1>localização de residencia</h1>
        <p class="subtitulo">
            Identificação de pontos no localizador de residencia
        </p>

        <div class="plano">

            <div class="eixo-x">Eixo X</div>
            <div class="eixo-y">Eixo Y</div>

            <div class="local casa">
                🏠
                <span>(50,50)</span>
            </div>

            <div class="local escola">
                🏫
                <span>(250,80)</span>
            </div>

            <div class="local mercado">
                🛒
                <span>(100,220)</span>
            </div>

            <div class="local hospital">
                🏥
                <span>(280,280)</span>
            </div>

        </div>

        <div class="legenda">

            <h2>Coordenadas dos Locais</h2>

            <table>
                <tr>
                    <th>Local</th>
                    <th>Coordenada</th>
                </tr>

                <tr>
                    <td>🏠 Casa</td>
                    <td>(50,50)</td>
                </tr>

                <tr>
                    <td>🏫 Escola</td>
                    <td>(250,80)</td>
                </tr>

                <tr>
                    <td>🛒 Mercado</td>
                    <td>(100,220)</td>
                </tr>

                <tr>
                    <td>🏥 Hospital</td>
                    <td>(300,300)</td>
                </tr>
            </table>

        </div>

    </div>

</body>
</html>
